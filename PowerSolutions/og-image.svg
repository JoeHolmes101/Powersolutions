<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04040A"/>
      <stop offset="100%" stop-color="#0C0C1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle gradient orb -->
  <circle cx="900" cy="315" r="280" fill="#7B2FFF" opacity="0.08"/>
  <circle cx="300" cy="315" r="250" fill="#00D4FF" opacity="0.06"/>
  <!-- Logo icon -->
  <rect x="80" y="200" width="100" height="100" rx="22" fill="url(#logoGrad)"/>
  <text x="130" y="265" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="44" letter-spacing="-1" fill="white">PS</text>
  <!-- Brand text -->
  <text x="200" y="258" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" fill="white">Power<tspan fill="#00D4FF">Solutions</tspan></text>
  <!-- Tagline -->
  <text x="82" y="370" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="56" fill="white">We Build The</text>
  <text x="82" y="440" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="56" fill="url(#accent)">AI-Powered Future</text>
  <!-- Subtext -->
  <text x="82" y="510" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="24" fill="#8888A0">AI Automation | Custom Agents | Strategy | Integrations | Analytics</text>
  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
